name: Sync and Format db.json

on:
  push:
    branches: [ main ]  # 每次你修改代码并推送时触发
  schedule:
    - cron: "0 0 */5 * *" # 每五天自动同步一次
  workflow_dispatch:    # 允许你在 Actions 页面手动点击运行

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download and Process JSON
        run: |
          # 1. 下载原始文件
          curl -L "https://raw.githubusercontent.com/hafrey1/LunaTV-config/5fc287be7ee6a21710ab4b6a20abe974ee33f517/LunaTV-config.json" -o raw.js
          
          # 2. 使用 Node.js 进行精准格式转换
          node -e "
          const fs = require('fs');
          try {
            let content = fs.readFileSync('raw.js', 'utf8');
            
            // 强力清洗：移除所有 // 和 /* */ 注释，防止解析失败
            content = content.replace(/\/\*[\s\S]*?\*\/|\/\/.*/g, '');
            
            // 移除 JSON 末尾多余的逗号
            content = content.replace(/,[ \t\r\n]*([}\]])/g, '\$1');

            // 解析数据（支持标准 JSON 和 宽松格式）
            let data;
            try {
              data = JSON.parse(content);
            } catch(e) {
              // 如果标准解析失败，尝试 eval（处理 JS 对象风格）
              data = eval('(' + content + ')');
            }

            // 构造目标格式：只要 sites 数组，字段只要 key, name, api, active
            const result = {
              sites: Object.entries(data).map(([key, val]) => ({
                key: key,
                name: val.name || '',
                api: val.api || val.url || '',
                active: true
              }))
            };

            // 写入 db.json，不保留 detail 项
            fs.writeFileSync('db.json', JSON.stringify(result, null, 2));
            console.log('转换成功：db.json 已生成');
          } catch (err) {
            console.error('处理失败:', err.message);
            process.exit(1);
          }
          "

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and Push
        run: |
          git add db.json
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore: sync and reformulate sites array"
            git push
          else
            echo "没有检测到内容变化，跳过推送。"
          fi
