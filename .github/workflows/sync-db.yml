name: Sync and Format db.json

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 0 */5 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download and Process JSON
        run: |
          # 1. 下载原始文件
          curl -L "https://raw.githubusercontent.com/hafrey1/LunaTV-config/main/jin18.json" -o raw.txt
          
          # 2. 使用 Python 原生 JSON 引擎进行降维打击
          python3 -c "
          import json, re

          with open('raw.txt', 'r', encoding='utf-8') as f:
              text = f.read()

          # 预处理：清洗掉可能导致解析失败的 JS 注释和多余的逗号
          text = re.sub(r'/\*[\s\S]*?\*/', '', text)
          text = re.sub(r'//.*', '', text)
          text = re.sub(r',\s*([}\]])', r'\1', text)

          try:
              # 将文本真正转化为层级明确的字典对象
              data = json.loads(text)
          except Exception as e:
              print(f'JSON 解析失败: {e}')
              exit(1)

          result = {'sites': []}
          
          # 精准制导：直接获取 api_site 这个层级下的所有内容
          api_sites = data.get('api_site', {})
          
          for key, info in api_sites.items():
              if isinstance(info, dict) and 'name' in info:
                  api_url = info.get('api') or info.get('url')
                  if api_url:
                      result['sites'].append({
                          'key': key,
                          'name': info['name'],
                          'api': api_url,
                          'active': True
                      })

          with open('db.json', 'w', encoding='utf-8') as f:
              json.dump(result, f, indent=2, ensure_ascii=False)

          # 打印成功日志，并特别展示抓取到的第一项
          if result['sites']:
              print(f'成功提取了 {len(result[\"sites\"])} 个站点！')
              print(f'第一项是: {result[\"sites\"][0][\"name\"]} ({result[\"sites\"][0][\"key\"]})')
          else:
              print('没有提取到任何站点。')
          "
          
          # 3. 删除临时文件
          rm raw.txt

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and Push
        run: |
          git add db.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: use native json parser to fix missing first item"
            git push
          else
            echo "数据未发生变化，跳过提交。"
          fi
