name: Sync db.json

on:
schedule:
- cron: "0 0 */5 * *"
workflow_dispatch:

permissions:
contents: write

jobs:
sync:
runs-on: ubuntu-latest

steps:
- name: Checkout repository
uses: actions/checkout@v4

- name: Download and create/update db.json
run: |
curl -L "https://raw.githubusercontent.com/hafrey1/LunaTV-config/5fc287be7ee6a21710ab4b6a20abe974ee33f517/LunaTV-config.json" -o db.json

- name: Commit and push if changed
run: |
git config user.name "github-actions[bot]"
git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
git add db.json
if ! git diff --cached --quiet; then
git commit -m "chore: sync db.json from LunaTV-config"
git push
else
echo "No changes to commit"
fi
