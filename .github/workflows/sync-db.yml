name: Sync and Format db.json

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 0 */5 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download and Process JSON
        run: |
          # 1. 下载原始文件
          curl -L "https://raw.githubusercontent.com/hafrey1/LunaTV-config/main/jin18.json" -o raw.txt
          
          # 2. 使用 Node.js 精准定位提取
          node -e "
          const fs = require('fs');
          const content = fs.readFileSync('raw.txt', 'utf8');
          
          // 步骤 A: 找到 api_site 的起始位置，并截取它之后的内容
          const startMarker = '\"api_site\"';
          const startIndex = content.indexOf(startMarker);
          if (startIndex === -1) {
              console.error('未找到 api_site 节点');
              process.exit(1);
          }
          
          // 只处理 api_site 之后的内容
          const subContent = content.substring(startIndex + startMarker.length);
          const result = { sites: [] };
          
          // 步骤 B: 匹配内部的所有站点块
          // 这个正则匹配: \"域名\": { 内容 }
          const entryRegex = /\"([^\"]+)\"\s*:\s*\{([\s\S]*?)\}/g;
          
          let match;
          while ((match = entryRegex.exec(subContent)) !== null) {
              const key = match[1];
              const body = match[2];
              
              // 再次确认 body 里面包含 name 和 api 字段（防止误抓其他杂项）
              const nameMatch = body.match(/\"name\"\s*:\s*\"([^\"]+)\"/);
              const apiMatch = body.match(/\"(?:api|url)\"\s*:\s*\"([^\"]+)\"/);
              
              if (nameMatch && apiMatch) {
                  result.sites.push({
                      key: key,
                      name: nameMatch[1],
                      api: apiMatch[1],
                      active: true
                  });
              }
          }
          
          fs.writeFileSync('db.json', JSON.stringify(result, null, 2));
          console.log('转换成功！共提取 ' + result.sites.length + ' 个站点。');
          "

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and Push
        run: |
          git add db.json
          if [ -n \"\$(git status --porcelain)\" ]; then
            git commit -m \"chore: fix first item missing issue\"
            git push
          else
            echo \"No changes to commit\"
          fi
