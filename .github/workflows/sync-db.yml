name: Sync and Format db.json

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 0 */5 * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download and Process JSON
        run: |
          # 1. 下载原始文件
          curl -L "https://raw.githubusercontent.com/hafrey1/LunaTV-config/main/jin18.json" -o raw.txt
          
          # 2. 免疫报错的降维提取法
          python3 -c '
          import re, json

          with open("raw.txt", "r", encoding="utf-8") as f:
              content = f.read()

          result = {"sites": []}
          
          # 魔法正则：只匹配没有嵌套大括号的“最内层对象”
          # 这样能完美跳过 api_site 外壳，精准抓到第一项和后面的每一项
          pattern = re.compile(r"\"([^\"]+)\"\s*:\s*\{([^{}]+)\}")

          for match in pattern.finditer(content):
              key = match.group(1)
              body = match.group(2)

              # 在提取的内容块中寻找 name 和 api
              name_match = re.search(r"\"name\"\s*:\s*\"([^\"]+)\"", body)
              api_match = re.search(r"\"(?:api|url)\"\s*:\s*\"([^\"]+)\"", body)

              if name_match and api_match:
                  result["sites"].append({
                      "key": key,
                      "name": name_match.group(1),
                      "api": api_match.group(1),
                      "active": True
                  })

          with open("db.json", "w", encoding="utf-8") as f:
              json.dump(result, f, indent=2, ensure_ascii=False)

          count = len(result["sites"])
          print(f"处理成功！提取了 {count} 个站点。")
          if count > 0:
              first_name = result["sites"][0]["name"]
              first_key = result["sites"][0]["key"]
              print(f"第一项是: {first_name} ({first_key})")
          else:
              print("未提取到任何站点，请检查源文件。")
          '
          
          # 3. 销毁临时文件
          rm raw.txt

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit / Push / Native Keep-alive
        run: |
          git add db.json
          if ! git diff --cached --quiet; then
            # 正常情况：数据有变化，正常提交
            git commit -m "chore: robust inner-block extraction to bypass invalid JSON chars"
            git push
            echo "数据已发生变化并成功同步提交。"
          else
            # 数据无变化，启动原生保活检测机制
            echo "数据未发生变化，开始检测是否需要触发保活机制..."
            
            # 获取最后一次提交的时间戳和当前时间戳
            LAST_COMMIT_TS=$(git log -1 --format="%ct")
            CURRENT_TS=$(date +%s)
            
            # 计算相差天数 (86400秒 = 1天)
            DIFF_DAYS=$(( (CURRENT_TS - LAST_COMMIT_TS) / 86400 ))
            echo "距离仓库上次提交已过去: $DIFF_DAYS 天"
            
            # 如果超过 50 天没有提交，强制触发一个空提交保活
            if [ "$DIFF_DAYS" -ge 50 ]; then
              echo "警告：仓库即将达到 60 天闲置上限！执行自动保活空提交..."
              git commit --allow-empty -m "chore: auto keep-alive to prevent workflow suspension"
              git push
              echo "保活提交完成！定时任务已续命。"
            else
              echo "安全：未达到 50 天危险阈值，本次跳过提交。"
            fi
          fi
