name: Sync and Format db.json

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 0 */5 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download and Process JSON
        run: |
          # 1. 下载原始文件
          curl -L "https://raw.githubusercontent.com/hafrey1/LunaTV-config/main/jin18.json" -o raw.txt
          
          # 2. 使用 Node.js 提取全部站点数据
          node -e "
          const fs = require('fs');
          const content = fs.readFileSync('raw.txt', 'utf8');
          const result = { sites: [] };
          
          // 匹配模式：查找 \"域名\": { ... } 结构
          const entryRegex = /\"([^\"]+)\"\s*:\s*\{([^}]+)\}/g;
          let match;
          
          while ((match = entryRegex.exec(content)) !== null) {
              const key = match[1];
              const body = match[2];
              
              // 排除外层非站点标签
              if (['api_site', 'cache_time'].includes(key)) continue;

              const nameMatch = body.match(/\"name\"\s*:\s*\"([^\"]+)\"/);
              const apiMatch = body.match(/\"(?:api|url)\"\s*:\s*\"([^\"]+)\"/);
              
              if (nameMatch && apiMatch) {
                  result.sites.push({
                      key: key,
                      name: nameMatch[1],
                      api: apiMatch[1],
                      active: true
                  });
              }
          }
          
          fs.writeFileSync('db.json', JSON.stringify(result, null, 2));
          console.log('成功提取：' + result.sites.length + ' 个站点已同步至 db.json');
          "

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and Push
        run: |
          git add db.json
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore: sync all sites from jin18.json"
            git push
          else
            echo "No changes to commit"
          fi
