name: Sync and Format db.json

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 0 */5 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download and Process JSON
        run: |
          # 1. 下载原始文件
          curl -L "https://raw.githubusercontent.com/hafrey1/LunaTV-config/5fc287be7ee6a21710ab4b6a20abe974ee33f517/LunaTV-config.json" -o raw.txt
          
          # 2. 使用 Node.js 提取所有站点
          node -e "
          const fs = require('fs');
          const content = fs.readFileSync('raw.txt', 'utf8');
          
          // 清理注释
          const cleanContent = content.replace(/\/\*[\s\S]*?\*\/|\/\/.*/g, '');
          
          const result = { sites: [] };
          
          /**
           * 正则说明：
           * \"([^\"]+)\"  -> 匹配双引号内的域名 (Key)
           * \s*:\s*\{     -> 匹配冒号和大括号
           * ([\s\S]*?)    -> 匹配大括号内的所有内容 (Body)
           * \}(?=\s*\"|,|\s*\}) -> 匹配结束大括号，且后面跟着下一个键或结束符
           */
          const entryRegex = /\"([^\"]+)\"\s*:\s*\{([\s\S]*?)\}(?=\s*\"|,|\s*\})/g;
          
          let match;
          while ((match = entryRegex.exec(cleanContent)) !== null) {
              const key = match[1];
              const body = match[2];
              
              // 排除非站点项
              if (['api_site', 'cache_time'].includes(key)) continue;
              
              // 在 body 中精准提取 name 和 api
              const nameMatch = body.match(/\"name\"\s*:\s*\"([^\"]+)\"/);
              const apiMatch = body.match(/\"api\"\s*:\s*\"([^\"]+)\"/);
              
              // 只有同时具备 name 和 api 的才被视为有效站点
              if (nameMatch && apiMatch) {
                  result.sites.push({
                      key: key,
                      name: nameMatch[1],
                      api: apiMatch[1],
                      active: true
                  });
              }
          }
          
          fs.writeFileSync('db.json', JSON.stringify(result, null, 2));
          console.log('Successfully processed ' + result.sites.length + ' sites.');
          "

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and Push
        run: |
          git add db.json
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore: fixed sync logic to capture all site items"
            git push
          else
            echo "No changes detected."
          fi
