name: Sync and Format db.json

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 0 */5 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download and Process JSON
        run: |
          # 1. 下载原始文件
          curl -L "https://raw.githubusercontent.com/hafrey1/LunaTV-config/5fc287be7ee6a21710ab4b6a20abe974ee33f517/LunaTV-config.json" -o raw.txt
          
          # 2. 优化后的正则：精准定位包含 name 的站点块
          node -e "
          const fs = require('fs');
          const content = fs.readFileSync('raw.txt', 'utf8');
          const result = { sites: [] };
          
          // 匹配模式：查找 \"域名\": { ... name: ... } 结构
          // 我们增加一个限制：body 必须包含 name 字段，且 key 不能是 api_site
          const entryRegex = /\"([^\"]+)\"\s*:\s*\{([^}]+name[^}]+)\}/g;
          let match;
          
          while ((match = entryRegex.exec(content)) !== null) {
              const key = match[1];
              const body = match[2];
              
              // 排除掉 api_site 这一层
              if (key === 'api_site') continue;
              
              const nameMatch = body.match(/\"name\"\s*:\s*\"([^\"]+)\"/);
              const apiMatch = body.match(/\"(?:api|url)\"\s*:\s*\"([^\"]+)\"/);
              
              if (nameMatch && apiMatch) {
                  result.sites.push({
                      key: key,
                      name: nameMatch[1],
                      api: apiMatch[1],
                      active: true
                  });
              }
          }
          
          fs.writeFileSync('db.json', JSON.stringify(result, null, 2));
          console.log('Successfully extracted ' + result.sites.length + ' sites.');
          "

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and Push
        run: |
          git add db.json
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore: fix api_site key issue and sync"
            git push
          else
            echo "No changes to commit"
          fi
