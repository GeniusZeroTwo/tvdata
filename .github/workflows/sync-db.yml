name: Sync and Format db.json

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 */5 * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download and Process JSON
        run: |
          # 1. 下载原始文件
          curl -L "https://raw.githubusercontent.com/hafrey1/LunaTV-config/5fc287be7ee6a21710ab4b6a20abe974ee33f517/LunaTV-config.json" -o raw.json
          
          # 2. 使用 jq 处理对象结构并转换为数组
          # to_entries 会把 {"k": {"name": "..."}} 变成 [{"key": "k", "value": {"name": "..."}}]
          # 然后我们重新构造每一个元素
          cat raw.json | jq '{
            sites: [ to_entries[] | {
              key: .key,
              name: .value.name,
              api: .value.api,
              active: true
            } ]
          }' > db.json
          
          # 打印结果检查格式
          cat db.json

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and Push
        run: |
          git add db.json
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore: convert object to sites array"
            git push
          else
            echo "No changes to commit"
          fi
