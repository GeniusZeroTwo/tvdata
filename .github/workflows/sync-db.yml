name: Sync and Format db.json

on:
  push:
    branches: [ main ] # 每次修改代码时触发
  schedule:
    - cron: "0 0 */5 * *" # 每五天自动同步
  workflow_dispatch: # 允许手动点击触发

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Download and Process JSON
        run: |
          # 1. 下载原始文件
          curl -L "https://raw.githubusercontent.com/hafrey1/LunaTV-config/5fc287be7ee6a21710ab4b6a20abe974ee33f517/LunaTV-config.json" -o raw.json
          
          # 2. 使用 Python 进行强力清洗和格式转换
          python3 -c "
          import json, re

          def clean_json(text):
              # 移除 // 注释
              text = re.sub(r'//.*', '', text)
              # 移除 /* */ 注释
              text = re.sub(r'/\*.*?\*/', '', text, flags=re.DOTALL)
              return text

          with open('raw.json', 'r', encoding='utf-8') as f:
              content = clean_json(f.read())
              # 尝试解析并转换
              try:
                  data = json.loads(content)
                  new_data = {'sites': []}
                  for key, val in data.items():
                      new_data['sites'].append({
                          'key': key,
                          'name': val.get('name', ''),
                          'api': val.get('api', val.get('url', '')), # 自动兼容 api 或 url 字段
                          'active': True
                      })
                  with open('db.json', 'w', encoding='utf-8') as wf:
                      json.dump(new_data, wf, indent=2, ensure_ascii=False)
                  print('JSON processed successfully.')
              except Exception as e:
                  print(f'Error processing JSON: {e}')
                  exit(1)
          "

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and Push
        run: |
          git add db.json
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore: auto sync and format db.json (Python Cleaned)"
            git push
          else
            echo "No changes detected, skipping push."
          fi
