name: Sync and Format db.json

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 0 */5 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download and Process JSON
        run: |
          # 1. 下载原始文件
          curl -L "https://raw.githubusercontent.com/hafrey1/LunaTV-config/main/jin18.json" -o raw.txt
          
          # 2. 使用 Python 提取数据 (稳定版)
          python3 -c "
          import re, json

          with open('raw.txt', 'r', encoding='utf-8') as f:
              content = f.read()

          # 定位 api_site，防止漏掉第一项
          start_marker = '\"api_site\"'
          start_index = content.find(start_marker)
          if start_index != -1:
              content = content[start_index:]

          result = {'sites': []}
          pattern = re.compile(r'\"?([\w\.\-]+)\"?\s*:\s*\{([\s\S]*?)\}')
          
          for match in pattern.finditer(content):
              key = match.group(1)
              body = match.group(2)

              if key in ['api_site', 'cache_time']:
                  continue

              name_match = re.search(r'\"name\"\s*:\s*\"([^\"]+)\"', body)
              api_match = re.search(r'\"(?:api|url)\"\s*:\s*\"([^\"]+)\"', body)

              if name_match and api_match:
                  result['sites'].append({
                      'key': key,
                      'name': name_match[1],
                      'api': api_match[1],
                      'active': True
                  })

          with open('db.json', 'w', encoding='utf-8') as f:
              json.dump(result, f, indent=2, ensure_ascii=False)
          
          print(f'处理成功！提取了 {len(result[\"sites\"])} 个站点。')
          "
          
          # 3. 清理临时文件，防止干扰 Git
          rm raw.txt

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and Push
        run: |
          git add db.json
          # 精准检查：只有暂存区确实有变化时，才执行 commit
          if ! git diff --cached --quiet; then
            git commit -m "chore: sync db.json from jin18.json"
            git push
          else
            echo "没有检测到 db.json 的变化，跳过提交。"
          fi
