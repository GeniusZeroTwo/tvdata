name: Sync and Format db.json

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 0 */5 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download and Process JSON
        run: |
          # 1. 下载原始文件
          curl -L "https://raw.githubusercontent.com/hafrey1/LunaTV-config/5fc287be7ee6a21710ab4b6a20abe974ee33f517/LunaTV-config.json" -o raw.js
          
          # 2. 使用 Node.js 处理数据
          # 这种方法可以绕过标准 JSON 的严格限制（如注释、末尾逗号等）
          node -e "
          const fs = require('fs');
          try {
            let content = fs.readFileSync('raw.js', 'utf8');
            // 移除注释并尝试提取对象内容
            content = content.replace(/\/\*[\s\S]*?\*\/|\/\/.*/g, '');
            
            // 使用 eval 是一种处理非标准 JSON/JS 对象的强力手段
            // 假设文件内容是一个对象结构
            let data;
            try {
              data = JSON.parse(content);
            } catch(e) {
              // 如果 JSON.parse 失败，尝试用更宽松的方式解析
              data = eval('(' + content + ')');
            }

            const result = { sites: [] };
            for (const [key, val] of Object.entries(data)) {
              if (val && typeof val === 'object') {
                result.sites.push({
                  key: key,
                  name: val.name || '',
                  api: val.api || val.url || '',
                  active: true
                });
              }
            }

            fs.writeFileSync('db.json', JSON.stringify(result, null, 2));
            console.log('Successfully processed db.json');
          } catch (err) {
            console.error('Processing failed:', err.message);
            process.exit(1);
          }
          "

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and Push
        run: |
          git add db.json
          if [ -n \"\$(git status --porcelain)\" ]; then
            git commit -m "chore: sync and robustly format db.json"
            git push
          else
            echo "No changes to commit"
          fi
