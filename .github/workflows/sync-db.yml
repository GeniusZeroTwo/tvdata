name: Sync and Format db.json

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 0 */5 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download and Process JSON
        run: |
          # 1. 下载原始文件
          curl -L "https://raw.githubusercontent.com/hafrey1/LunaTV-config/5fc287be7ee6a21710ab4b6a20abe974ee33f517/LunaTV-config.json" -o raw.js
          
          # 2. 使用 Node.js 进行深度清洗
          # 逻辑：移除所有注释 -> 修复末尾逗号 -> 将 JS 对象强制转为 JSON
          node -e "
          const fs = require('fs');
          try {
            let content = fs.readFileSync('raw.js', 'utf8');
            
            // 移除单行和多行注释
            content = content.replace(/\/\*[\s\S]*?\*\/|\/\/.*/g, '');
            
            // 移除对象末尾多余的逗号 (JSON 不允许 {a:1,} 这种格式)
            content = content.replace(/,[ \t\r\n]*([}\]])/g, '\$1');

            // 修复没有双引号的键名 (如果是 JS 对象风格)
            content = content.replace(/([{,])\s*([a-zA-Z0-9._-]+)\s*:/g, '\$1\"\$2\":');

            let data = JSON.parse(content);
            const result = { sites: [] };

            for (const [key, val] of Object.entries(data)) {
              if (val && typeof val === 'object') {
                result.sites.push({
                  key: key,
                  name: val.name || '',
                  api: val.api || val.url || '',
                  active: true
                });
              }
            }

            fs.writeFileSync('db.json', JSON.stringify(result, null, 2));
            console.log('Successfully generated db.json');
          } catch (err) {
            console.error('Error:', err.message);
            process.exit(1);
          }
          "

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and Push
        run: |
          git add db.json
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore: auto-sync db.json"
            git push
          else
            echo "No changes found."
          fi
