name: Sync and Format db.json

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 0 */5 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download and Process JSON
        run: |
          # 1. 下载原始文件
          curl -L "https://raw.githubusercontent.com/hafrey1/LunaTV-config/5fc287be7ee6a21710ab4b6a20abe974ee33f517/LunaTV-config.json" -o raw.txt
          
          # 2. 深度扫描：不再依赖引号，直接匹配大括号块
          node -e "
          const fs = require('fs');
          const content = fs.readFileSync('raw.txt', 'utf8');
          const result = { sites: [] };
          
          // 正则逻辑：
          // 1. 匹配 站点Key (带或不带引号)
          // 2. 匹配 紧随其后的大括号内容
          // 3. 确保内容里包含 name 字段
          const entryRegex = /([\w\.\-]+)\s*\"\s*:\s*\{([\s\S]*?)\}/g;
          
          // 针对 LunaTV 这种特殊格式，我们先去掉干扰注释
          const cleanContent = content.replace(/\/\*[\s\S]*?\*\/|\/\/.*/g, '');

          // 匹配带引号或不带引号的 Key
          // 格式如 \"iqiyizyapi.com\": { ... } 或 iqiyizyapi.com: { ... }
          const refinedRegex = /\"?([\w\.\-]+)\"?\s*:\s*\{([\s\S]*?)\}/g;
          
          let match;
          while ((match = refinedRegex.exec(cleanContent)) !== null) {
              const key = match[1];
              const body = match[2];
              
              // 排除外层容器和无关项
              if (['api_site', 'cache_time', 'video_extension'].includes(key)) continue;
              
              const nameMatch = body.match(/\"name\"\s*:\s*\"([^\"]+)\"/);
              const apiMatch = body.match(/\"(?:api|url)\"\s*:\s*\"([^\"]+)\"/);
              
              if (nameMatch && apiMatch) {
                  result.sites.push({
                      key: key,
                      name: nameMatch[1],
                      api: apiMatch[1],
                      active: true
                  });
              }
          }
          
          fs.writeFileSync('db.json', JSON.stringify(result, null, 2));
          console.log('成功提取了 ' + result.sites.length + ' 个站点。');
          "

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and Push
        run: |
          git add db.json
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore: fixed first item missing issue"
            git push
          else
            echo "没有内容变化。"
          fi
