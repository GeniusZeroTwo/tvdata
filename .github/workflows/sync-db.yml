name: Sync and Format db.json

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 */5 * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download and Process JSON
        run: |
          # 1. 下载原始文件到临时文件
          curl -L "https://raw.githubusercontent.com/hafrey1/LunaTV-config/5fc287be7ee6a21710ab4b6a20abe974ee33f517/LunaTV-config.json" -o raw.json
          
          # 2. 使用 jq 转换格式
          # 注意：这里假设原始文件的格式是数组或是包含 api/name 的结构
          # 我们遍历每一项，生成随机 UUID 作为 key
          cat raw.json | jq '{
            sites: [ .[] | {
              key: ("k" + (1000000000 | random | tostring)), 
              name: .name,
              api: .api,
              active: true
            } ]
          }' > db.json
          
          # 3. 删除临时文件
          rm raw.json

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and Push
        run: |
          git add db.json
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore: sync and format db.json with random keys"
            git push
          else
            echo "No changes to commit"
          fi
