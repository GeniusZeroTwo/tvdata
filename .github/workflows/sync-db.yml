name: Sync and Format db.json

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 */5 * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download and Process JSON
        run: |
          # 1. 下载原始文件
          curl -L "https://raw.githubusercontent.com/hafrey1/LunaTV-config/5fc287be7ee6a21710ab4b6a20abe974ee33f517/LunaTV-config.json" -o raw_with_comments.json
          
          # 2. 清理注释 (移除 // 及其后的内容) 并转换为标准 JSON
          # 然后使用 jq 将对象键名转为 "key" 字段
          cat raw_with_comments.json | \
          sed 's/\/\/.*//g' | \
          jq '{
            sites: [ to_entries[] | {
              key: .key,
              name: .value.name,
              api: .value.api,
              active: true
            } ]
          }' > db.json
          
          # 3. 验证结果
          head -n 20 db.json

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and Push
        run: |
          git add db.json
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore: sync sites, remove comments and format keys"
            git push
          else
            echo "No changes to commit"
          fi
