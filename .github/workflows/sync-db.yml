name: Sync and Format db.json

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 */5 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download and Process JSON
        run: |
          # 1. 下载原始文件
          curl -L "https://raw.githubusercontent.com/hafrey1/LunaTV-config/5fc287be7ee6a21710ab4b6a20abe974ee33f517/LunaTV-config.json" -o raw_src.json
          
          # 2. 强力清理：移除 // 和 /* */ 注释，同时保护 https://
          # 使用 perl 的正则处理比 sed 更安全
          perl -0777 -pe 's/\/\*[\s\S]*?\*\/|\/\/(?!\/)[^\n\r]*//g' raw_src.json > clean.json
          
          # 3. 转换格式
          # 将对象键名转为 key 字段，并确保输出的是 sites 数组
          cat clean.json | jq '{
            sites: [ to_entries[] | {
              key: .key,
              name: .value.name,
              api: .value.api,
              active: true
            } ]
          }' > db.json
          
          # 打印结果前 20 行进行确认
          head -n 20 db.json

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and Push
        run: |
          git add db.json
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore: auto sync and format db.json"
            git push
          else
            echo "No changes to commit"
          fi
